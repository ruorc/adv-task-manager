<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="task-manager-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Task Manager</title>

    <!-- GitHub Pages SPA Routing Hack: Part 1 -->
    <script type="text/javascript">
      (function (l) {
        if (l.search === '?') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .reduce(function (r, s) {
              var b = s.split('=');
              r[b[0]] = b[1];
              return r;
            }, {});
          if (decoded.p !== undefined) {
            window.history.replaceState(
              null,
              null,
              l.pathname.slice(
                0,
                l.pathname.length - (decoded.p || '').length
              ) +
                decoded.p +
                (decoded.q ? '?' + decoded.q : '') +
                l.hash
            );
          }
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
